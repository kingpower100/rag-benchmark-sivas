services:
  pipeline1:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: rag-benchmark-pipeline1
    command: ["python", "-m", "src.pipeline1.main", "--config", "configs/pipeline1/experiments/11_sivas_fixed512_faiss_dense_qwen25.yaml"]
    environment:
      # Use host machine Ollama from inside container.
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    volumes:
      # Input files stay on host and are mounted read-only.
      - ../../data/raw:/app/data/raw:ro
      # Persist run outputs on host.
      - ../../data/runs:/app/data/runs
      # Persist cache artifacts to avoid recomputation.
      - ../../data/processed:/app/data/processed
    extra_hosts:
      - "host.docker.internal:host-gateway"
