  metric: cosine
  dense_dim: 2
retrieval:
  retriever_type: elasticsearch_dense
  top_k: 1
  fetch_k: 1
reranker:
  enabled: false
orchestration:
  enabled: false
  provider: ollama
  fixed: true
  model_name: llama3.1:8b
  prompt_path: C:\Users\Louay FG\Desktop\RAG BENCHM ERP11\rag_benchmark\src\pipeline1\prompts\orchestration_promptV4.txt
  prompt_version: orchestration_promptV4
generation:
  provider: ollama
  model_name: fake
  base_url: http://localhost:11434
  system_prompt: Use context.
telemetry:
  estimate_cost: false
runtime:
  save_csv: false
  resume: false
  overwrite: true
