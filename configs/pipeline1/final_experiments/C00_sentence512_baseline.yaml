extends: "E00-G_global_dense_baseline.yaml"

# C00 is operationally identical to E00-G. A separate execution can be avoided
# only after resolved config and artifact hashes confirm identity.

experiment:
  experiment_id: "C00"

orchestration:
  enabled: false

# fallback_to_global and category_routing_validation.enabled are dormant when
# retriever_type="dense" (the routing branches in retrieval_stage.py are never
# entered). Declared explicitly so resolved configs match declared intent and
# all C-series children inherit safe values without relying on schema defaults.
retrieval:
  fallback_to_global: false
  category_routing_validation:
    enabled: false
