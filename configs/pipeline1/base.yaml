experiment:
  experiment_id: "p1_base"
  random_seed: 42
  output_dir: "data/runs/pipeline1"

data:
  documents_path: "data/raw/documents.jsonl"
  questions_path: "data/raw/questions_only.jsonl"
  question_id_field: "id"
  question_field: "question"
  document_text_field: "cleaned_context"
  allow_document_text_fallback: false
  allow_unsafe_query_fields: false
  use_ground_truth_contexts: false
  use_gold_answers: false

chunking:
  strategy: "fixed_token"
  chunk_size: 512
  chunk_overlap: 64
  tokenizer_name: "cl100k_base"
  allow_word_fallback: false

embedding:
  provider: "sentence_transformers"
  model_name: "BAAI/bge-small-en-v1.5"
  normalize_embeddings: true
  batch_size: 64
  device: "cuda"

index:
  type: "faiss"
  metric: "cosine"

retrieval:
  retriever_type: "dense"
  top_k: 3
  fetch_k: 10
  metadata_boosting:
    enabled: false
    company_weight: 0.3
    year_weight: 0.15
    symbol_weight: 0.2
    file_name_weight: 0.0
  metadata_filtering:
    enabled: false
    strict: false

reranker:
  enabled: false
  model_name: null

generation:
  provider: "ollama"
  model_name: "gemma3:1b"
  base_url: "http://localhost:11434"
  temperature: 0.0
  max_tokens: 16
  timeout_s: 300
  include_metadata_headers: false
  system_prompt: |
    You are a financial QA system specialized in numeric extraction.

    Use ONLY the retrieved context to answer the question.

    Rules:
    - Return ONLY the final answer.
    - Do NOT explain your reasoning.
    - Do NOT output full sentences.
    - Do NOT use markdown.
    - If the answer is numeric, return only the number.
    - Preserve decimals and negative signs.
    - If the answer cannot be found in the context, return EXACTLY: UNKNOWN


telemetry:
  estimate_cost: true
  pricing:
    input_per_1k_tokens_usd: 0.0
    output_per_1k_tokens_usd: 0.0

runtime:
  save_csv: true
  log_level: "INFO"
  resume: false
  overwrite: true
