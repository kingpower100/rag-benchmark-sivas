# Smoke-test configuration for the PostgreSQL + pgvector dense retrieval backend.
#
# Purpose:
#   Validates that CategoryAwareDenseRetriever in pgvector mode can connect to
#   PostgreSQL, issue SQL WHERE-clause category queries, and produce Pipeline 1
#   output that is format-compatible with Pipeline 2 evaluation.
#   This experiment is NOT part of the benchmark series (experiments 11–18).
#   It exists only to verify the pgvector backend before launching a full
#   benchmark run.
#
# Retrieval backend: pgvector (HNSW, cosine, 1024-dim)
# Category routing:  SQL WHERE clause on the `category` column (pgvector mode);
#                    no per-category FAISS sub-indexes are built.
#
# Prerequisites:
#   1. PostgreSQL is running and reachable via $PGVECTOR_DSN.
#   2. Schema, table, and HNSW index have been created:
#        python scripts/init_pgvector.py
#   3. Documents have been indexed:
#        python scripts/index_pgvector.py \
#          --config configs/pipeline1/experiments/99a_pgvector_dense_smoke.yaml
#   4. PGVECTOR_DSN is exported — NOT stored in this file:
#        export PGVECTOR_DSN="postgresql://rag:rag@localhost:5432/rag"
#
# Inheritance: extends base.yaml — chunking, embedding, orchestration, generation,
# telemetry, and runtime are all inherited without modification.

extends: "../base.yaml"

experiment:
  experiment_id: "99a_pgvector_dense_smoke"
  output_dir: "data/runs/pipeline1"

embedding:
  cache_dir: ".cache/sentence-transformers"

index:
  type: pgvector
  metric: cosine
  dense_dim: 1024

  # pgvector is required when index.type=pgvector (schema validator enforces this).
  # dsn_env names the environment variable that holds the PostgreSQL DSN.
  # The runtime resolves os.environ[dsn_env] — no URL is hardcoded here,
  # keeping this file portable across local, CI, and remote environments.
  pgvector:
    dsn_env: "PGVECTOR_DSN"
    schema_name: "rag"
    table_name: "chunk_embeddings"
    index_type: "hnsw"
    rebuild_index: false
    hnsw_m: 16
    hnsw_ef_construction: 64
    hnsw_ef_search: 40

retrieval:
  retriever_type: "category_aware_dense"
  top_k: 5
  fetch_k: 20
  category_field: "kategorie"
  fallback_to_global: true

  metadata_boosting:
    enabled: false

  metadata_filtering:
    enabled: false

runtime:
  save_csv: true
  log_level: "INFO"
  resume: false
  overwrite: true
  cache_mismatch_policy: "raise"
