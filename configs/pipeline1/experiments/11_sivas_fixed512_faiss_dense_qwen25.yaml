extends: "../base.yaml"

experiment:
  experiment_id: "11_sivas_fixed512_faiss_dense_qwen25"
  random_seed: 42
  output_dir: "data/runs/pipeline1"

data:
  dataset_schema: "sivas"
  documents_path: "data/raw/kb_documents_fixed.jsonl"
  documents_source_type: "jsonl"
  questions_path: "data/raw/questions_fixed.jsonl"
  document_text_field: "text"
  question_id_field: "question_id"
  question_field: "frage"
  allow_document_text_fallback: false
  allow_unsafe_query_fields: false

chunking:
  strategy: "fixed_token"
  chunk_size: 512
  chunk_overlap: 64
  tokenizer_name: "cl100k_base"

embedding:
  provider: "sentence_transformers"
  model_name: "BAAI/bge-small-en-v1.5"
  normalize_embeddings: true
  batch_size: 128
  device: "cuda"
  require_cuda: true
  cache_dir: "/models/sentence-transformers"

index:
  type: "faiss"
  metric: "cosine"

retrieval:
  retriever_type: "category_aware_dense"
  top_k: 5
  fetch_k: 20
  category_field: "kategorie"
  fallback_to_global: true
  metadata_boosting:
    enabled: false
  metadata_filtering:
    enabled: false

reranker:
  enabled: false
  model_name: null
  device: "cpu"

orchestration:
  fixed: true
  model_name: "mistral-small"
  base_url: "http://localhost:11434"
  temperature: 0.0
  max_tokens: 256
  timeout_s: 180

generation:
  configurable: true
  provider: "ollama"
  model_name: "qwen2.5:7b"
  base_url: "http://localhost:11434"
  temperature: 0.0
  max_tokens: 256
  timeout_s: 180
  include_metadata_headers: true
  system_prompt: |
    Du bist ein QA-System fuer interne SIVAS/ERP-Wissensdokumente.

    Beantworte die Frage ausschliesslich anhand des abgerufenen Kontexts.

    Regeln:
    - Gib nur die finale Antwort aus.
    - Erfinde keine Details.
    - Nutze Deutsch, sofern die Frage auf Deutsch gestellt ist.
    - Wenn die Antwort im Kontext nicht enthalten ist, antworte exakt: UNKNOWN

runtime:
  save_csv: true
  log_level: "INFO"
  resume: true
  overwrite: false
  cache_mismatch_policy: "raise"
