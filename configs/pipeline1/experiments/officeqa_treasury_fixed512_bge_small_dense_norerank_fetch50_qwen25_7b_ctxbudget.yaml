extends: "../base.yaml"

experiment:
  experiment_id: "officeqa_treasury_fixed512_bge_small_dense_norerank_fetch50_qwen25_7b_ctxbudget"
  random_seed: 42
  output_dir: "data/runs/pipeline1"

documents:
  source_type: "txt_folder"
  path: "data/raw/transformed"
  file_glob: "*.txt"
  recursive: true
  text_field: "cleaned_context"

data:
  questions_path: "data/raw/questions_only.jsonl"
  question_id_field: "uid"
  question_field: "question"
  allow_document_text_fallback: false
  allow_unsafe_query_fields: false
  use_ground_truth_contexts: false
  use_gold_answers: false

chunking:
  strategy: "fixed_token"
  chunk_size: 512
  chunk_overlap: 64
  tokenizer_name: "cl100k_base"
  allow_word_fallback: false
  max_chunk_chars: 8000
  max_chunk_tokens: 1800
  oversized_chunk_policy: "split"
  oversized_chunk_warning: true

embedding:
  provider: "sentence_transformers"
  model_name: "BAAI/bge-small-en-v1.5"
  normalize_embeddings: true
  batch_size: 128
  device: "cuda"
  require_cuda: true

index:
  type: "faiss"
  metric: "cosine"

retrieval:
  retriever_type: "dense"
  top_k: 10
  fetch_k: 50
  bm25:
    enabled: true
    backend: "local"
    k1: 1.5
    b: 0.75
  hybrid:
    rrf_k: 60
    dense_weight: 1.0
    bm25_weight: 1.0
  metadata_boosting:
    enabled: false
    company_weight: 0.3
    year_weight: 0.15
    symbol_weight: 0.2
    file_name_weight: 0.0
  metadata_filtering:
    enabled: false
    strict: false

reranker:
  enabled: false
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  device: "cuda"
  final_top_k: 5

generation:
  provider: "ollama"
  model_name: "qwen2.5:7b"
  base_url: "http://localhost:11434"
  temperature: 0.0
  max_tokens: 64
  timeout_s: 180
  include_metadata_headers: true
  max_prompt_tokens: 8192
  max_context_tokens: 6000
  max_chunk_tokens: 1800
  max_context_chars: 24000
  max_chunk_chars: 8000
  context_truncation_strategy: "ranked_budget"
  log_prompt_stats: true
  system_prompt: |
    You are a financial question-answering system.

    Use ONLY the retrieved context to answer the question.

    Rules:
    - Return ONLY the final answer.
    - Do NOT explain your reasoning.
    - Do NOT output full sentences.
    - Do NOT use markdown.
    - Preserve decimals and negative signs.
    - Compute from the retrieved evidence when needed.
    - If the required evidence is missing, return EXACTLY: UNKNOWN

telemetry:
  estimate_cost: true
  pricing:
    input_per_1k_tokens_usd: 0.0
    output_per_1k_tokens_usd: 0.0

runtime:
  save_csv: true
  log_level: "INFO"
  resume: true
  overwrite: false
  cache_mismatch_policy: "raise"
