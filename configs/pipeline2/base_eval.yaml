evaluation:
  eval_run_id: "11_sivas_fixed512_faiss_dense_qwen25_eval"
  output_dir: "data/eval/runs/pipeline2"
  retrieval_only: false
  retrieval_eval_field: "retrieved_file_names"
  max_generation_failure_rate: 0.05
  strict_failure_threshold: false
inputs:
  pipeline1_results_path: "data/runs/pipeline1/11_sivas_fixed512_faiss_dense_qwen25/results.jsonl"
  rag_outputs:
    - "data/runs/pipeline1/11_sivas_fixed512_faiss_dense_qwen25/results.jsonl"
  questions_path: "data/raw/questions_fixed.jsonl"
  qa_path: "data/raw/qa_ground_truth_fixed.jsonl"
  gold_contexts_path: "data/raw/qa_ground_truth_fixed.jsonl"
retrieval:
  k: 5
  ks: [1, 3, 5]
answer_quality:
  enable_numeric_accuracy: true
  abstention_patterns: ["UNKNOWN", "NOT FOUND", "N/A", "CANNOT DETERMINE"]
leaderboard:
  sort_metric: "mean_recall_at_5"
  sort_ascending: false
runtime:
  overwrite: true
  save_csv: true
