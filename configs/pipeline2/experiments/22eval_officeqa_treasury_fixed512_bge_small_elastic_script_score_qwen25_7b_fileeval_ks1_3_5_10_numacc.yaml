# Eval for Elasticsearch script_score fixed512 baseline variant.
extends: "../base_eval.yaml"

evaluation:
  eval_run_id: "eval_officeqa_treasury_fixed512_bge_small_elastic_script_score_qwen25_7b_fileeval_ks1_3_5_10_numacc"
  output_dir: "data/eval/runs/pipeline2"
  retrieval_only: false
  retrieval_eval_field: "retrieved_file_names"
  max_generation_failure_rate: 0.05
  strict_failure_threshold: false

inputs:
  rag_outputs:
    - "data/runs/pipeline1/officeqa_treasury_fixed512_bge_small_elastic_script_score_qwen25_7b_ctxbudget/results.jsonl"
  qa_path: "data/raw/qa_test.jsonl"
  gold_contexts_path: "data/raw/ground_truth_contexts.jsonl"

retrieval:
  k: 5
  ks: [1, 3, 5, 10]

answer_quality:
  enable_numeric_accuracy: true
  abstention_patterns: ["UNKNOWN", "NOT FOUND", "N/A", "CANNOT DETERMINE"]

leaderboard:
  sort_metric: "mean_numeric_accuracy"
  sort_ascending: false

debug:
  enable_officeqa_smoke_check: false

runtime:
  overwrite: false
  save_csv: true
