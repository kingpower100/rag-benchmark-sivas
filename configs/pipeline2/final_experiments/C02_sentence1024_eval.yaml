extends: "../base_eval.yaml"

evaluation:
  eval_run_id: "C02_sentence1024_eval"
  strict_failure_threshold: true
  max_generation_failure_rate: 0.0

inputs:
  pipeline1_results_path: "data/runs/pipeline1/C02/results.jsonl"
  rag_outputs:
    - "data/runs/pipeline1/C02/results.jsonl"

retrieval_evaluation:
  document_level:
    enabled: true
  chunk_level:
    enabled: true
    ground_truth_path: "data/ground_truth/chunk_level/C02_sentence1024_overlap400/gold_chunk_annotations_C02_sentence1024_overlap400.jsonl"
    missing_question_policy: error
