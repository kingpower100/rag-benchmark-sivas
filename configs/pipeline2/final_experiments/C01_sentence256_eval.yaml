extends: "../base_eval.yaml"

evaluation:
  eval_run_id: "C01_sentence256_eval"
  strict_failure_threshold: true
  max_generation_failure_rate: 0.0

inputs:
  pipeline1_results_path: "data/runs/pipeline1/C01/results.jsonl"
  rag_outputs:
    - "data/runs/pipeline1/C01/results.jsonl"

retrieval_evaluation:
  document_level:
    enabled: true
  chunk_level:
    enabled: true
    ground_truth_path: "data/ground_truth/chunk_level/C01_sentence256_overlap100/gold_chunk_annotations_C01_sentence256_overlap100.jsonl"
    missing_question_policy: error
